<!-- KONTEN MODAL GANTI PASSWORD DENGAN ANIMASI HALUS -->
<div id="modalPassword" style="display: {% if buka_modal_password %}flex{% else %}none{% endif %}; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 9999; animation: fadeIn 0.25s ease-out;">
    
    <!-- Animasi zoom-in halus pada kotak form (scaleUp) -->
    <div style="background: white; width: 100%; max-width: 450px; padding: 30px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); position: relative; animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);">
        
        <!-- Header Modal -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="font-size: 18px; font-weight: 700; color: #0f172a; margin: 0;">Form Ganti Password</h3>
            <button onclick="tutupModalPassword()" style="background: none; border: none; font-size: 20px; cursor: pointer; color: #94a3b8;">&times;</button>
        </div>

        <!-- Form Proses POST ke Views Dashboard -->
        <form method="POST">
            {% csrf_token %}
            
            <div style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px;">
                <div>
                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #334155;">Password Lama</label>
                    <input type="password" name="password_lama" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
                </div>
                
                <div>
                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #334155;">Password Baru</label>
                    <input type="password" name="password_baru" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
                    <small style="font-size: 11px; color: #64748b; display: block; margin-top: 4px;">Minimal 8 karakter (Huruf, Angka, & Karakter Spesial)</small>
                </div>
                
                <div>
                    <label style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #334155;">Konfirmasi Password Baru</label>
                    <input type="password" name="konfirmasi_password" required style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
                </div>
            </div>

            <!-- Tombol Aksi -->
            <div style="display: flex; justify-content: flex-end; gap: 10px;">
                <button type="button" onclick="tutupModalPassword()" style="background: #f1f5f9; color: #475569; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600;">Batal</button>
                <button type="submit" name="submit_password" style="background: #ef4444; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600;">Simpan Perubahan</button>
            </div>
        </form>
    </div>
</div>

<!-- BLOCK GAYA ANIMASI CSS & JAVASCRIPT DETEKSI CLOSE -->
<style>
    /* Jalur Animasi 1: Latar belakang memudar hitam transparan */
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* Jalur Animasi 2: Kotak form membesar sedikit dari bawah ke atas (efek Pop-Up bouncer) */
    @keyframes scaleUp {
        from { transform: scale(0.95) translateY(10px); opacity: 0; }
        to { transform: scale(1) translateY(0); opacity: 1; }
    }
</style>

<script>
    function tutupModalPassword() {
        const modal = document.getElementById('modalPassword');
        // Berikan transisi manual saat menutup sebelum display disembunyikan total
        modal.style.transition = 'opacity 0.2s ease-out';
        modal.style.opacity = '0';
        setTimeout(() => {
            modal.style.display = 'none';
            modal.style.opacity = '1'; // Reset untuk dipanggil kembali nanti
        }, 200);
    }
</script>
